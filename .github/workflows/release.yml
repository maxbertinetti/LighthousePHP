name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PHP is available
        run: php -v

      - name: Run test suite
        run: php lighthousephp test

      - name: Build release bundle
        env:
          LIGHTHOUSE_RELEASE_VERSION: ${{ github.ref_name }}
        run: ./scripts/package-release.sh dist

      - name: Build checksum
        env:
          VERSION: ${{ github.ref_name }}
        run: sha256sum "dist/lighthousephp-$VERSION.tar.gz" > "dist/lighthousephp-$VERSION.tar.gz.sha256"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          archive="dist/lighthousephp-$VERSION.tar.gz"
          checksum="$archive.sha256"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "$archive" "$checksum" --clobber
            exit 0
          fi

          gh release create "$VERSION" "$archive" "$checksum" \
            --title "LighthousePHP $VERSION" \
            --generate-notes
