site_name: LighthousePHP
site_description: A lightweight PHP framework
site_url: https://maxbertinetti.github.io/LighthousePHP
repo_url: https://github.com/maxbertinetti/LighthousePHP
repo_name: lighthousephp

theme:
  name: material
  language: en
  logo: assets/images/logo.png
  favicon: assets/images/logo.png 
  
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs    
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer

  palette:   
    # Palette toggle for light mode
    - scheme: default
      primary: deep orange
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - social
  - blog

extra:
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

  analytics:
    provider: google
    property: G-2Z8Z3R83YM
  
  social:
    - icon: fontawesome/brands/mastodon 
      link: https://fosstodon.org/@squidfunk
    - icon: fontawesome/brands/x-twitter
      link: https://fosstodon.org/@squidfunk
    